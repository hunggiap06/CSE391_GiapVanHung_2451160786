<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Media</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<!-- Ảnh sản phẩm -->
<figure>
    <img src="https://tintuc.dienthoaigiakho.vn/wp-content/uploads/2024/10/dien-thoai-mau-den-1.jpg"
         alt="Ảnh sản phẩm điện thoại màu đen"
         loading="lazy"
         width = "200px">
    <figcaption> Thiết kế sang trọng</figcaption>
</figure>

<figure>
    <img src="https://media.karousell.com/media/photos/products/2023/11/23/iphone_13_256gb_1700704903_76f48b5c.jpg"
         alt="Ảnh sản phẩm điện thoại góc nghiêng"
         loading="lazy"
         width = "200px">
    <figcaption> Góc nhìn chi tiết</figcaption>
</figure>

<figure>
    <img src="https://inc42.com/cdn-cgi/image/quality=75/https://asset.inc42.com/2025/09/iphone-17-featured.png"
         alt="Ảnh sản phẩm điện thoại hiển thị màn hình"
         loading="lazy"
         width = "200px">
    <figcaption> Màn hình sắc nét</figcaption>
</figure>

<hr>

<!-- Video YouTube -->
<h2>Video giới thiệu (YouTube)</h2>
<iframe width="560" height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Video sản phẩm"
        frameborder="0"
        allowfullscreen>
</iframe>

<hr>

<hr>

<!-- Audio -->
<h2>Nhạc nền</h2>
<audio controls>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio.
</audio>

<hr>

<!-- SVG inline -->
<h2>Logo</h2>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="blue"></circle>
</svg>

</body>
</html>
